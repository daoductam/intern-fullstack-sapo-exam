spring:
  application:
    name: flashsale
  datasource:
    url: jdbc:h2:mem:flashsale_db
    username: sa
    password: password
    driverClassName: org.h2.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  redis:
    host: localhost
    port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

flashsale:
  max-quantity-per-user: 2
  redis:
    stock-key-prefix: "flash_sale:stock:"
    user-limit-key-prefix: "flash_sale:user_limit:"
